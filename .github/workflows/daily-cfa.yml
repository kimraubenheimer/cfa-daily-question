name: Daily CFA Question

on:
  schedule:
    # 9am South Africa time = 07:00 UTC
    - cron: "0 7 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-cfa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Generate daily question and send email
        run: python app/generate_question.py
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

      - name: Commit new question page
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add app/questions

          git diff --cached --quiet || git commit -m "Add daily CFA question"

          git push