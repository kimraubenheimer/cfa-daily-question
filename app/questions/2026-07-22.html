
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFA Question 2026-07-22</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #ffffff;
            --ink: #0f172a;
            --muted: #64748b;
            --line: #e2e8f0;
            --brand: #1e40af;
            --brand-soft: #eff6ff;
            --ok: #16a34a;
            --ok-soft: #f0fdf4;
            --bad: #dc2626;
            --bad-soft: #fef2f2;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
            color: var(--ink);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 48px 20px;
        }

        .box {
            background: var(--card);
            width: 100%;
            max-width: 560px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(2, 6, 23, 0.45);
            overflow: hidden;
        }

        .header {
            padding: 28px 32px 20px;
            border-bottom: 1px solid var(--line);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--brand);
            background: var(--brand-soft);
            padding: 6px 12px;
            border-radius: 999px;
            margin: 0 0 16px;
        }

        .question {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.5;
            margin: 0;
            color: var(--ink);
        }

        .options {
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            text-align: left;
            padding: 16px 18px;
            border: 1.5px solid var(--line);
            border-radius: 12px;
            background: #fff;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: var(--ink);
            transition: border-color .15s, background .15s, transform .1s, box-shadow .15s;
        }

        .option:hover:not(:disabled) {
            border-color: var(--brand);
            background: var(--brand-soft);
        }

        .option:active:not(:disabled) { transform: scale(0.99); }

        .badge {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: #f1f5f9;
            color: var(--muted);
            display: grid;
            place-items: center;
            font-weight: 700;
            font-size: 13px;
            transition: background .15s, color .15s;
        }

        .option.correct {
            border-color: var(--ok);
            background: var(--ok-soft);
            color: var(--ok);
        }
        .option.correct .badge { background: var(--ok); color: #fff; }

        .option.selected {
            border-color: var(--brand);
            background: var(--brand-soft);
            color: var(--brand);
        }
        .option.selected .badge { background: var(--brand); color: #fff; }

        .option.dim { opacity: 0.5; }
        .option:disabled { cursor: default; }

        .explanation {
            margin: 0 32px 32px;
            padding: 0 20px;
            max-height: 0;
            opacity: 0;
            border-radius: 12px;
            overflow: hidden;
            transition: max-height .35s ease, opacity .3s ease, padding .35s ease;
        }

        .explanation.show {
            max-height: 600px;
            opacity: 1;
            padding: 20px;
        }

        .explanation.result-neutral {
            background: #f8fafc;
            border: 1px solid var(--line);
        }

        .result-label {
            font-size: 14px;
            font-weight: 700;
            margin: 0 0 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .result-neutral .result-label { color: var(--brand); }

        .explanation p {
            margin: 0;
            font-size: 14.5px;
            line-height: 1.65;
            color: #334155;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="box">
    <div class="header">
        <p class="eyebrow">Question of the Day &middot; 2026-07-22</p>
        <h1 class="question">The return on invested capital (ROIC) has been trending lower over the last several years for a company. A potential reason for this decline is that the industry has lower:</h1>
    </div>

    <div class="options" id="options">
        <button class="option" data-choice="a" onclick="checkAnswer('a')">
            <span class="badge">A</span><span>Barriers to entry.</span>
        </button>
        <button class="option" data-choice="b" onclick="checkAnswer('b')">
            <span class="badge">B</span><span>Bargaining power of suppliers.</span>
        </button>
        <button class="option" data-choice="c" onclick="checkAnswer('c')">
            <span class="badge">C</span><span>Bargaining power of customers.</span>
        </button>
    </div>

    <div class="explanation" id="explanation">
        <p class="result-label" id="resultLabel"></p>
        <p id="explanationText"></p>
    </div>
</div>

<script>
    const answerText = "Correct Answer: A. \rA lower barrier to entry can cause an industry to become more competitive. The lower ROIC is a result of a more competitive situation. Lower bargaining power of either suppliers or customers would lead to a potentially higher ROIC.";
    let answered = false;

function checkAnswer(choice) {
    if (answered) return;
    answered = true;

    const buttons = document.querySelectorAll('.option');

    buttons.forEach(btn => {
        btn.disabled = true;

        if (btn.dataset.choice === choice) {
            btn.classList.add('selected');
        } else {
            btn.classList.add('dim');
        }
    });

    const box = document.getElementById('explanation');
    const label = document.getElementById('resultLabel');

    box.classList.add('show', 'result-neutral');

    label.textContent = 'You selected ' + choice.toUpperCase();
    document.getElementById('explanationText').textContent = answerText;

    box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>

</body>
</html>
